name: CI

on:
  pull_request:
    # 코드/빌드에 영향 없는 변경(문서 등)에는 CI 를 돌리지 않는다.
    paths:
      - "backend/**"
      - "backend/openapi.json"
      - "frontend/**"
      - "frontend/lib/api/**"
      - "docs/**"
      - ".env.example"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"
  push:
    branches: [dev, main]
    paths:
      - "backend/**"
      - "backend/openapi.json"
      - "frontend/**"
      - "frontend/lib/api/**"
      - "docs/**"
      - ".env.example"
      - "pyproject.toml"
      - ".github/workflows/ci.yml"

# lint/build 잡은 읽기 권한만 필요하다 (최소 권한).
permissions:
  contents: read

# 같은 ref 에 새 푸시가 오면 진행 중이던 이전 CI 를 취소한다.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-artifacts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate OpenAPI JSON contract
        run: |
          test -f backend/openapi.json
          python - <<'PY'
          import json
          from pathlib import Path

          spec = json.loads(Path("backend/openapi.json").read_text())
          assert spec["openapi"].startswith("3."), spec["openapi"]
          assert "/api/v1/reports" in spec["paths"], "missing /api/v1/reports"
          post = spec["paths"]["/api/v1/reports"]["post"]
          assert "requestBody" in post, "missing requestBody"
          assert "responses" in post and "200" in post["responses"], "missing 200 response"
          print("OpenAPI contract OK")
          PY

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v4
      - run: uv tool install ruff
      - run: ruff check backend/
      - run: ruff format --check backend/

  js-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - name: ESLint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && pnpm install --config.strict-dep-builds=false && pnpm --config.strict-dep-builds=false exec eslint .
          else
            echo "CI: eslint skipped (frontend not initialized)"
          fi

  js-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - name: TypeScript check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && pnpm install --config.strict-dep-builds=false && pnpm --config.strict-dep-builds=false exec tsc --noEmit
          else
            echo "CI: tsc skipped (frontend not initialized)"
          fi

  js-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: corepack prepare pnpm@10.32.1 --activate
      - name: Next.js build
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && pnpm install --config.strict-dep-builds=false && pnpm --config.strict-dep-builds=false build
          else
            echo "CI: build skipped (frontend not initialized)"
          fi
